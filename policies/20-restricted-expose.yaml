id: restricted-exposure-policy
description: Implements default-deny for restricted resources (UCF Phase 3).
rules:
  - id: restricted-default-deny
    description: Default-deny for expose-to-llm on restricted resources.
    effect: deny
    match:
      action: [expose-to-llm]
    condition:
      resource.attributes.classification: { eq: restricted }
    priority: 100

  - id: permit-restricted-for-t3
    description: Permit restricted access only for T3 agents.
    effect: permit
    match:
      action: [expose-to-llm]
    condition:
      all_of:
        - resource.attributes.classification: { eq: restricted }
        - subject.attributes.tier: { eq: T3 }
    priority: 200
