id: subagent-scope-policy
description: Enforces task-level scope for subagents (UCF Phase 2).
rules:
  - id: subagent-scope-excludes
    description: Deny access if resource domain is explicitly excluded in task scope.
    effect: deny
    match:
      subject_kind: [subagent]
    condition:
      subject.attributes.scope.excludes: { intersect: resource.attributes.domain }
    priority: 1000

  - id: subagent-scope-needs
    description: Permit access if resource domain matches subagent needs.
    effect: permit
    match:
      subject_kind: [subagent]
    condition:
      subject.attributes.scope.needs: { intersect: resource.attributes.domain }
    priority: 500

  - id: subagent-deny-out-of-scope
    description: Deny access if subagent has needs but resource doesn't match any.
    effect: deny
    match:
      subject_kind: [subagent]
    condition:
      all_of:
        - subject.attributes.scope.needs: { exists: true }
        - subject.attributes.scope.needs: { ne: [] }
        - none_of:
            - subject.attributes.scope.needs: { intersect: resource.attributes.domain }
    priority: 100
