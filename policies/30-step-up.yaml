id: step-up-policy
description: Trigger step-up auth for sensitive actions (UCF Phase 4).
rules:
  - id: permit-deletion-with-step-up
    description: Permit deletion if subject has recent step-up.
    match:
      action: [delete]
    condition:
      subject.attributes.last_step_up_at: { ge: "2026-05-14T00:00:00Z" }
    effect: permit
    priority: 1500

  - id: pin-for-deletion
    description: Require recent step-up (PIN) for deletion.
    match:
      action: [delete]
    condition:
      any_of:
        - subject.attributes.last_step_up_at: { not_exists: true }
        - subject.attributes.last_step_up_at: { lt: "2026-05-14T00:00:00Z" }
    effect: deny
    on_deny:
      obligation:
        kind: request-step-up-auth
        params: { method: pin, ttl: 300 }
    priority: 1000
