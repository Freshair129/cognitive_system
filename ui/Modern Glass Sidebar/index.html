<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glass Sidebar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <nav class="sidebar">
        <div>
            <div class="brand">
                <i class="fas fa-cube"></i>
                <span>VORTEX</span>
            </div>

            <ul class="nav-list">
                <li class="nav-item" data-tooltip="Home">
                    <a href="#" class="nav-link active">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item" data-tooltip="Projects">
                    <a href="#" class="nav-link">
                        <i class="fas fa-layer-group"></i>
                        <span>Projects</span>
                    </a>
                </li>
                <li class="nav-item" data-tooltip="Analytics">
                    <a href="#" class="nav-link">
                        <i class="fas fa-chart-pie"></i>
                        <span>Analytics</span>
                    </a>
                </li>
                <li class="nav-item" data-tooltip="Team">
                    <a href="#" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>Team</span>
                    </a>
                </li>
            </ul>
        </div>

        <ul class="nav-list">
            <li class="nav-item" data-tooltip="Settings">
                <a href="#" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="content">
        <h1>Modern Glass Sidebar</h1>
        <p style="color:#666; margin-top:10px;">Hover over the left sidebar to see it expand.</p>
    </div>
    <script>
        // 1. Select all elements with the class 'nav-link'
        const navLinks = document.querySelectorAll('.nav-link');

        // 2. Loop through each link to add a click event listener
        navLinks.forEach(link => {
            link.addEventListener('click', function () {
                // 3. Remove 'active' class from ALL links
                navLinks.forEach(nav => nav.classList.remove('active'));

                // 4. Add 'active' class to the THIS link (the one that was clicked)
                this.classList.add('active');
            });
        });
    </script>
</body>
</body>

</html>
